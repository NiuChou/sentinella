# =============================================================================
# Sentinella Rule Pack: Django
# =============================================================================
#
# Detects authentication, authorization, rate-limiting, data-source usage,
# error-handling, and sensitive-logging patterns in Django applications.
#
# Evidence kinds (kebab-case serde values):
#   auth, auth-exempt, rate-limit, audit, csrf, two-factor,
#   soft-delete, real-data, error-handled, safe-ignore
#
# Evidence scopes (kebab-case serde values):
#   function, class, file, block, module
# =============================================================================

kind: rule-pack
name: django
version: "1.0.0"
languages: [python]

# ---------------------------------------------------------------------------
# Auto-detection: when does this rule pack activate?
# ---------------------------------------------------------------------------
detect:
  requirements_txt:
    - django
    - Django
  pyproject_toml:
    dependencies:
      - django
      - Django
  file_patterns:
    - "**/views.py"
    - "**/urls.py"
    - "**/models.py"

# ---------------------------------------------------------------------------
# Protection evidence rules
# ---------------------------------------------------------------------------
protection_evidence:

  # --- Authentication decorators ---
  - name: django-login-required
    description: >
      Detects @login_required decorator — requires the user to be
      authenticated before accessing the view.
    type: regex
    pattern: '@login_required'
    provides:
      kind: auth
      confidence: 0.95

  - name: django-permission-required
    description: >
      Detects @permission_required decorator — requires the user to hold
      a specific permission before accessing the view.
    type: regex
    pattern: '@permission_required\s*\('
    provides:
      kind: auth
      confidence: 0.95

  - name: django-auth-mixins
    description: >
      Detects LoginRequiredMixin or PermissionRequiredMixin in
      class-based views, enforcing authentication or permissions.
    type: regex
    pattern: '(?:LoginRequiredMixin|PermissionRequiredMixin|UserPassesTestMixin)'
    provides:
      kind: auth
      confidence: 0.90

  - name: django-csrf-exempt
    description: >
      Detects @csrf_exempt decorator — explicitly marks a view as
      not requiring CSRF protection.
    type: regex
    pattern: '@csrf_exempt'
    provides:
      kind: auth-exempt
      confidence: 0.90

  - name: django-ratelimit
    description: >
      Detects @ratelimit decorator from django-ratelimit package,
      indicating rate limiting is applied.
    type: regex
    pattern: '@ratelimit\s*\('
    provides:
      kind: rate-limit
      confidence: 0.90

  # --- Django REST Framework ---
  - name: django-drf-permission-classes
    description: >
      Detects Django REST Framework permission_classes assignment or
      decorator, including IsAuthenticated, IsAdminUser, etc.
    type: regex
    pattern: 'permission_classes\s*=\s*\[.*(?:IsAuthenticated|IsAdminUser|DjangoModelPermissions|AllowAny)'
    provides:
      kind: auth
      confidence: 0.90

  - name: django-drf-api-view
    description: >
      Detects @api_view decorator from Django REST Framework,
      indicating a function-based API endpoint.
    type: regex
    pattern: '@api_view\s*\(\s*\['
    provides:
      kind: audit
      confidence: 0.70

# ---------------------------------------------------------------------------
# Data-source evidence rules
# ---------------------------------------------------------------------------
data_source_evidence:

  # --- Django ORM model definition ---
  - name: django-model-definition
    description: >
      Detects Django model class definitions inheriting from
      models.Model, indicating database schema usage.
    type: regex
    pattern: 'class\s+\w+\s*\(.*models\.Model\s*\)'
    provides:
      kind: real-data
      confidence: 0.90

  # --- Django ORM query operations ---
  - name: django-orm-queries
    description: >
      Detects Django ORM query operations such as objects.filter,
      objects.get, objects.create, objects.all, etc.
    type: regex
    pattern: '\.objects\.(?:filter|get|create|all|exclude|update|delete|aggregate|annotate|values)\s*\('
    provides:
      kind: real-data
      confidence: 0.85

  # --- Raw SQL via connection.cursor ---
  - name: django-raw-sql
    description: >
      Detects raw SQL execution via Django's connection.cursor(),
      indicating direct database access.
    type: regex
    pattern: 'connection\.cursor\s*\(\s*\)'
    provides:
      kind: real-data
      confidence: 0.90

# ---------------------------------------------------------------------------
# Error handling configuration
# ---------------------------------------------------------------------------
error_handling:
  safe_ignore_patterns:
    - pattern: '\.close\(\)'
      reason: "Resource cleanup -- close errors are typically non-critical"
    - pattern: 'logger\.(?:debug|info)'
      reason: "Logging calls never need error checking"

# ---------------------------------------------------------------------------
# Sensitive logging configuration
# ---------------------------------------------------------------------------
sensitive_logging:
  safe_patterns:
    - "token_type"
    - "token expired"
    - "access_token"
    - "session expired"
  mask_functions:
    - "mask_phone"
    - "mask_email"
    - "redact"
    - "sanitize"
