# =============================================================================
# Sentinella Rule Pack: Flask
# =============================================================================
#
# Detects authentication, authorization, rate-limiting, data-source usage,
# error-handling, and sensitive-logging patterns in Flask applications.
#
# Evidence kinds (kebab-case serde values):
#   auth, auth-exempt, rate-limit, audit, csrf, two-factor,
#   soft-delete, real-data, error-handled, safe-ignore
#
# Evidence scopes (kebab-case serde values):
#   function, class, file, block, module
# =============================================================================

kind: rule-pack
name: flask
version: "1.0.0"
languages: [python]

# ---------------------------------------------------------------------------
# Auto-detection: when does this rule pack activate?
# ---------------------------------------------------------------------------
detect:
  requirements_txt:
    - flask
    - Flask
  pyproject_toml:
    dependencies:
      - flask
      - Flask
  file_patterns:
    - "**/app.py"
    - "**/wsgi.py"

# ---------------------------------------------------------------------------
# Protection evidence rules
# ---------------------------------------------------------------------------
protection_evidence:

  # --- Flask-Login authentication ---
  - name: flask-login-required
    description: >
      Detects @login_required decorator from Flask-Login,
      requiring the user to be authenticated.
    type: regex
    pattern: '@login_required'
    provides:
      kind: auth
      confidence: 0.95

  # --- Flask-JWT-Extended ---
  - name: flask-jwt-required
    description: >
      Detects @jwt_required decorator from Flask-JWT-Extended,
      requiring a valid JWT token for access.
    type: regex
    pattern: '@jwt_required\s*\('
    provides:
      kind: auth
      confidence: 0.95

  # --- Flask-Security role-based access ---
  - name: flask-roles-required
    description: >
      Detects @roles_required or @roles_accepted decorators from
      Flask-Security, enforcing role-based access control.
    type: regex
    pattern: '@(?:roles_required|roles_accepted)\s*\('
    provides:
      kind: auth
      confidence: 0.90

  # --- Flask-Limiter rate limiting ---
  - name: flask-rate-limiter
    description: >
      Detects @limiter.limit decorator from Flask-Limiter,
      indicating rate limiting is applied to the endpoint.
    type: regex
    pattern: '@limiter\.limit\s*\('
    provides:
      kind: rate-limit
      confidence: 0.90

  # --- before_request auth hook ---
  - name: flask-before-request-auth
    description: >
      Detects before_request hooks that perform authentication checks,
      such as verifying tokens or session validity.
    type: regex
    pattern: '@\w+\.before_request\s*\n.*(?:auth|token|session|login|verify|check_auth)'
    provides:
      kind: auth
      confidence: 0.75

# ---------------------------------------------------------------------------
# Data-source evidence rules
# ---------------------------------------------------------------------------
data_source_evidence:

  # --- SQLAlchemy session operations ---
  - name: flask-sqlalchemy
    description: >
      Detects SQLAlchemy ORM operations via db.session or session
      (query, add, commit, delete, execute).
    type: regex
    pattern: '(?:db\.session|session)\.\s*(?:query|add|commit|delete|execute|merge|flush)\s*\('
    provides:
      kind: real-data
      confidence: 0.85

  # --- MongoDB via PyMongo ---
  - name: flask-pymongo
    description: >
      Detects PyMongo or MongoClient usage indicating
      MongoDB data access.
    type: regex
    pattern: '(?:MongoClient\s*\(|mongo\.db\.|pymongo\.\w+)'
    provides:
      kind: real-data
      confidence: 0.85

  # --- Redis client ---
  - name: flask-redis
    description: >
      Detects Redis client usage via redis.Redis or
      redis.StrictRedis, indicating cache/data store access.
    type: regex
    pattern: 'redis\.(?:Redis|StrictRedis)\s*\('
    provides:
      kind: real-data
      confidence: 0.80

# ---------------------------------------------------------------------------
# Error handling configuration
# ---------------------------------------------------------------------------
error_handling:
  safe_ignore_patterns:
    - pattern: '\.close\(\)'
      reason: "Resource cleanup -- close errors are typically non-critical"
    - pattern: 'logger\.(?:debug|info)'
      reason: "Logging calls never need error checking"
    - pattern: 'app\.teardown_appcontext'
      reason: "Flask teardown hooks for cleanup are safe to ignore"

# ---------------------------------------------------------------------------
# Sensitive logging configuration
# ---------------------------------------------------------------------------
sensitive_logging:
  safe_patterns:
    - "token_type"
    - "token expired"
    - "access_token"
    - "session expired"
  mask_functions:
    - "mask_phone"
    - "mask_email"
    - "redact"
    - "sanitize"
